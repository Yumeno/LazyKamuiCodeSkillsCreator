<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Queue Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header>
    <button id="menu-toggle" aria-label="Settings" title="Settings">☰</button>
    <h1>Queue Dashboard</h1>
    <span id="server-time"></span>
    <div id="worker-controls">
      <button id="btn-start" class="wk-btn" hidden title="Start worker">▶ Start</button>
      <button id="btn-stop" class="wk-btn" hidden title="Stop worker">■ Stop</button>
      <button id="btn-restart" class="wk-btn" hidden title="Restart worker">↻ Restart</button>
    </div>
    <span id="status-indicator" title="Connection status">●</span>
  </header>

  <div id="error-banner" hidden></div>

  <!-- Settings panel (slide-in from right) -->
  <aside id="config-panel" hidden>
    <div class="panel-header">
      <h2>Settings</h2>
      <button id="panel-close" aria-label="Close">×</button>
    </div>
    <fieldset>
      <legend>Category Limits</legend>
      <label>Max Inflight <input id="cfg-max-inflight" type="number" min="1" step="1"></label>
      <label>Min Interval (s) <input id="cfg-min-interval" type="number" min="0" step="0.1"></label>
      <label>429 Cooldown (s) <input id="cfg-cooldown" type="number" min="0" step="60"></label>
    </fieldset>
    <fieldset>
      <legend>Endpoint Defaults</legend>
      <label>Max Concurrent <input id="cfg-max-concurrent" type="number" min="1" step="1"></label>
      <label>Min Interval (s) <input id="cfg-ep-interval" type="number" min="0" step="0.5"></label>
    </fieldset>
    <fieldset>
      <legend>Worker</legend>
      <label>Idle Timeout (s) <input id="cfg-idle-timeout" type="number" min="0" step="10"></label>
    </fieldset>
    <div class="panel-actions">
      <button id="cfg-apply">Apply</button>
      <button id="cfg-reload">Reload Current</button>
    </div>
    <div id="cfg-result"></div>
  </aside>
  <div id="config-overlay" hidden></div>

  <section id="summary">
    <div class="card"><h3>Pending</h3><div id="count-pending">-</div></div>
    <div class="card"><h3>Running</h3><div id="count-running">-</div></div>
    <div class="card"><h3>Completed</h3><div id="count-completed">-</div></div>
    <div class="card"><h3>Failed</h3><div id="count-failed">-</div></div>
  </section>

  <section id="categories">
    <h2>Categories</h2>
    <div id="category-grid"></div>
  </section>

  <section id="skills">
    <h2>Registered Skills <button id="skills-refresh" title="Refresh skill list">↻</button> <span id="skills-count"></span></h2>
    <div id="skills-grid"></div>
  </section>

  <section id="endpoints">
    <h2>Endpoints</h2>
    <table id="endpoint-table">
      <thead>
        <tr><th>Endpoint</th><th>Pending</th><th>Running</th><th>Completed</th><th>Failed</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section id="jobs">
    <h2>Recent Jobs</h2>
    <div id="job-filter">
      <button data-filter="all" class="active">All</button>
      <button data-filter="pending">Pending</button>
      <button data-filter="running">Running</button>
      <button data-filter="polling">Polling</button>
      <button data-filter="completed">Completed</button>
      <button data-filter="failed">Failed</button>
      <label style="margin-left:auto">
        Limit:
        <input id="limit-input" type="number" value="50" min="1" max="500" step="10">
      </label>
    </div>
    <ul id="job-list"></ul>
  </section>

  <div id="job-detail-modal" hidden role="dialog" aria-modal="true">
    <div class="modal-content">
      <button class="close" aria-label="Close">×</button>
      <pre id="job-detail-content"></pre>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
