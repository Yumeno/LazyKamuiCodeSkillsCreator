name: Build Release Package

on:
  push:
    tags: ['lazy-v*']

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tar.gz
        run: |
          STAGING=$(mktemp -d)

          # --- mcp-async-skill ---
          SRC=.claude/skills/mcp-async-skill
          DST=$STAGING/mcp-async-skill
          mkdir -p $DST/scripts/job_queue

          cp $SRC/scripts/generate_skill.py $DST/scripts/
          cp $SRC/scripts/mcp_async_call.py $DST/scripts/
          cp $SRC/scripts/mcp_worker_daemon.py $DST/scripts/
          cp $SRC/scripts/job_queue/*.py $DST/scripts/job_queue/
          cp $SRC/SKILL.md $DST/

          # --- queue-dashboard (bundled alongside) ---
          QD_SRC=.claude/skills/queue-dashboard
          QD_DST=$STAGING/queue-dashboard
          mkdir -p $QD_DST/scripts/static

          cp $QD_SRC/SKILL.md $QD_DST/
          cp $QD_SRC/scripts/queue_dashboard.py $QD_DST/scripts/
          cp $QD_SRC/scripts/static/index.html $QD_DST/scripts/static/
          cp $QD_SRC/scripts/static/dashboard.css $QD_DST/scripts/static/
          cp $QD_SRC/scripts/static/dashboard.js $QD_DST/scripts/static/

          tar czf mcp-async-skill.tar.gz -C $STAGING mcp-async-skill queue-dashboard

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/mcp-async-skill.tar.gz"

          cat > release-notes.md <<'EOF'
          ## Install

          ### bash (Linux / macOS / WSL / Git Bash)
          ```bash
          mkdir -p .claude/skills
          curl -fSL -o mcp-async-skill.tar.gz __URL__
          tar xzf mcp-async-skill.tar.gz -C .claude/skills/
          rm mcp-async-skill.tar.gz
          pip install pyyaml requests
          ```

          ### PowerShell (Windows)
          ```powershell
          New-Item -ItemType Directory -Force -Path .claude\skills
          curl.exe -fSL -o mcp-async-skill.tar.gz __URL__
          tar xzf mcp-async-skill.tar.gz -C .claude\skills\
          Remove-Item mcp-async-skill.tar.gz
          pip install pyyaml requests
          ```
          EOF

          sed -i 's/^          //' release-notes.md
          sed -i "s|__URL__|${URL}|g" release-notes.md

          gh release create "$TAG" \
            mcp-async-skill.tar.gz \
            --title "$TAG" \
            --notes-file release-notes.md

      - name: Update version in docs
        run: |
          TAG="${{ github.ref_name }}"
          git fetch origin main
          git checkout main
          sed -i -E "s|releases/download/lazy-v[0-9.]+/|releases/download/${TAG}/|g" README.md docs/release-process.md
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/release-process.md
          git commit -m "docs: update download URLs to ${TAG}"
          git push
