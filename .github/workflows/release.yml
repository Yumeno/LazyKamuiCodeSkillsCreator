name: Build Release Package

on:
  push:
    tags: ['lazy-v*']

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tar.gz
        run: |
          SRC=.claude/skills/mcp-async-skill
          STAGING=$(mktemp -d)
          DST=$STAGING/mcp-async-skill

          mkdir -p $DST/scripts/job_queue

          # Copy scripts (no tests, no __pycache__)
          cp $SRC/scripts/generate_skill.py $DST/scripts/
          cp $SRC/scripts/mcp_async_call.py $DST/scripts/
          cp $SRC/scripts/mcp_worker_daemon.py $DST/scripts/
          cp $SRC/scripts/job_queue/__init__.py $DST/scripts/job_queue/
          cp $SRC/scripts/job_queue/db.py $DST/scripts/job_queue/
          cp $SRC/scripts/job_queue/dispatcher.py $DST/scripts/job_queue/
          cp $SRC/scripts/job_queue/worker.py $DST/scripts/job_queue/
          cp $SRC/scripts/job_queue/client.py $DST/scripts/job_queue/

          # Copy SKILL.md
          cp $SRC/SKILL.md $DST/

          tar czf mcp-async-skill.tar.gz -C $STAGING mcp-async-skill

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            mcp-async-skill.tar.gz \
            --title "${{ github.ref_name }}" \
            --notes "## Install

          ### bash (Linux / macOS / WSL / Git Bash)
          \`\`\`bash
          mkdir -p .claude/skills
          curl -fSL -o mcp-async-skill.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mcp-async-skill.tar.gz
          tar xzf mcp-async-skill.tar.gz -C .claude/skills/
          rm mcp-async-skill.tar.gz
          pip install pyyaml requests
          \`\`\`

          ### PowerShell (Windows)
          \`\`\`powershell
          New-Item -ItemType Directory -Force -Path .claude\skills
          curl.exe -fSL -o mcp-async-skill.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mcp-async-skill.tar.gz
          tar xzf mcp-async-skill.tar.gz -C .claude\skills\
          Remove-Item mcp-async-skill.tar.gz
          pip install pyyaml requests
          \`\`\`"
